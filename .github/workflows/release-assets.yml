name: Release assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CODEX_WINDOWS_X64_MSIX_URL: "https://codexapp.agentsmirror.com/latest/win-x64"
      CODEX_WINDOWS_X64_MSIX_CACHE_KEY: "2026-06-30"
      NODE_RUNTIME_VERSION: "v24.18.0"
      NODE_WINDOWS_X64_ZIP_URL: "https://nodejs.org/dist/v24.18.0/node-v24.18.0-win-x64.zip"
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/codex-plus-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          key: release-windows-x64-${{ hashFiles('Cargo.lock') }}
          cache-on-failure: true

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install NSIS with retry
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installed = $false
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            choco install nsis -y --no-progress
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Chocolatey failed to install NSIS on attempt $attempt."
              Start-Sleep -Seconds (10 * $attempt)
              continue
            }
            $installed = $true
            break
          }
          if (-not $installed) {
            throw "Chocolatey failed to install NSIS after retries."
          }

          $candidatePaths = @(
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
            "${env:ProgramFiles}\NSIS\makensis.exe",
            "C:\ProgramData\chocolatey\bin\makensis.exe"
          )
          $makensis = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $makensis) {
            $command = Get-Command makensis -ErrorAction SilentlyContinue
            if ($command) {
              $makensis = $command.Source
            }
          }
          if (-not $makensis) {
            throw "NSIS makensis.exe was not found"
          }
          "NSIS_MAKENSIS=$makensis" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-plus-plus.exe dist/windows/app/
          Copy-Item target/release/codex-plus-plus-manager.exe dist/windows/app/
          if ($env:CODEX_APP_SOURCE) {
            if (-not (Test-Path $env:CODEX_APP_SOURCE)) {
              throw "CODEX_APP_SOURCE is set but does not exist: $env:CODEX_APP_SOURCE"
            }
            Copy-Item $env:CODEX_APP_SOURCE dist/windows/app/Codex -Recurse -Force
          } else {
            Write-Host "CODEX_APP_SOURCE not set; installer will rely on the management tool install flow."
          }

      - name: Cache Node Windows runtime
        uses: actions/cache@v4
        with:
          path: ~/.cache/codex-plus-release/windows/node-${{ env.NODE_RUNTIME_VERSION }}-win-x64.zip
          key: ${{ runner.os }}-node-${{ env.NODE_RUNTIME_VERSION }}-win-x64

      - name: Download Node Windows runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $nodeRoot = "dist/windows/node"
          $zip = "$nodeRoot/node-runtime.zip"
          $cache = Join-Path $env:USERPROFILE ".cache\codex-plus-release\windows\node-${env:NODE_RUNTIME_VERSION}-win-x64.zip"
          New-Item -ItemType Directory -Force $nodeRoot | Out-Null
          New-Item -ItemType Directory -Force (Split-Path $cache) | Out-Null
          if (Test-Path $cache) {
            Copy-Item $cache $zip -Force
          } else {
            curl.exe -L --retry 3 --retry-delay 10 --fail -o $zip $env:NODE_WINDOWS_X64_ZIP_URL
            Copy-Item $zip $cache -Force
          }
          $size = (Get-Item $zip).Length
          if ($size -lt 20MB) {
            throw "Downloaded Node runtime is unexpectedly small: $size bytes"
          }
          $extract = "$nodeRoot/extracted"
          if (Test-Path $extract) {
            Remove-Item $extract -Recurse -Force
          }
          Expand-Archive -Force -Path $zip -DestinationPath $extract
          $source = Get-ChildItem $extract -Directory | Where-Object { $_.Name -like "node-v*-win-x64" } | Select-Object -First 1
          if (-not $source) {
            throw "No Node win-x64 runtime directory found"
          }
          $dest = "dist/windows/app/resources/node"
          if (Test-Path $dest) {
            Remove-Item $dest -Recurse -Force
          }
          New-Item -ItemType Directory -Force $dest | Out-Null
          Copy-Item "$($source.FullName)\*" $dest -Recurse -Force
          if (-not (Test-Path "$dest\node.exe")) {
            throw "Bundled Node node.exe was not staged"
          }

      - name: Cache Codex Windows MSIX
        uses: actions/cache@v4
        with:
          path: ~/.cache/codex-plus-release/windows/CodexOfficialApp-x64.msix
          key: ${{ runner.os }}-codex-windows-msix-${{ env.CODEX_WINDOWS_X64_MSIX_CACHE_KEY }}

      - name: Download Codex Windows MSIX
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force dist/windows/package | Out-Null
          $msix = "dist/windows/package/CodexOfficialApp-x64.msix"
          $cache = Join-Path $env:USERPROFILE ".cache\codex-plus-release\windows\CodexOfficialApp-x64.msix"
          New-Item -ItemType Directory -Force (Split-Path $cache) | Out-Null
          if (Test-Path $cache) {
            Copy-Item $cache $msix -Force
          } else {
            curl.exe -L --retry 3 --retry-delay 10 --fail -o $msix $env:CODEX_WINDOWS_X64_MSIX_URL
            Copy-Item $msix $cache -Force
          }
          $size = (Get-Item $msix).Length
          if ($size -lt 100MB) {
            throw "Downloaded Codex MSIX is unexpectedly small: $size bytes"
          }

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart("v", "V")
          $makensis = $env:NSIS_MAKENSIS
          if (-not $makensis -or -not (Test-Path $makensis)) {
            $command = Get-Command makensis -ErrorAction SilentlyContinue
            if ($command) {
              $makensis = $command.Source
            }
          }
          if (-not $makensis -or -not (Test-Path $makensis)) {
            throw "NSIS makensis.exe was not found"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexPlusPlus.nsi
          Pop-Location

      - name: Build Windows ZIP package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ github.event.release.tag_name }}".TrimStart("v", "V")
          $setup = "dist/windows/CodexPlusOfficial-${version}-windows-x64-setup.exe"
          $msix = "dist/windows/package/CodexOfficialApp-x64.msix"
          if (-not (Test-Path $setup)) {
            throw "Missing setup executable: $setup"
          }
          if (-not (Test-Path $msix)) {
            throw "Missing Codex MSIX: $msix"
          }
          $packageRoot = "dist/windows/package-root"
          if (Test-Path $packageRoot) {
            Remove-Item $packageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force $packageRoot | Out-Null
          $resourcesDir = "$packageRoot/安装资源"
          New-Item -ItemType Directory -Force $resourcesDir | Out-Null
          Copy-Item $setup "$packageRoot/双击安装.exe"
          Copy-Item $msix "$resourcesDir/CodexOfficialApp-x64.msix"
          Compress-Archive -Force -Path "$packageRoot/*" -DestinationPath "dist/windows/CodexPlusOfficial-${version}-windows-x64.zip"

      - name: Upload Windows assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/windows/*.zip
            dist/windows/*-setup.exe

  latest-json:
    name: Upload static latest.json
    runs-on: ubuntu-latest
    needs:
      - windows-installer
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/$REPO/releases/tags/$TAG" > release.json
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const tag = release.tag_name || process.env.TAG;
          const version = tag.replace(/^v/i, "");
          const assets = (release.assets || [])
            .filter((asset) => asset.name !== "latest.json")
            .map((asset) => {
              const digest = typeof asset.digest === "string" ? asset.digest : "";
              const sha256 = digest.toLowerCase().startsWith("sha256:") ? digest.slice("sha256:".length) : undefined;
              const name = asset.name;
              const platform = name.toLowerCase().includes("macos") || name.toLowerCase().endsWith(".dmg") ? "macos" : "windows";
              const arch = name.toLowerCase().includes("arm64") || name.toLowerCase().includes("aarch64") ? "arm64" : "x64";
              const purpose = name.toLowerCase().endsWith(".zip") ? "download" : "updater";
              return {
                name,
                platform,
                arch,
                purpose,
                size: asset.size,
                url: asset.browser_download_url,
                ...(sha256 ? { sha256 } : {})
              };
            })
            .sort((left, right) => {
              const platformOrder = { windows: 0, macos: 1 };
              const purposeOrder = { updater: 0, download: 1 };
              return (platformOrder[left.platform] ?? 9) - (platformOrder[right.platform] ?? 9)
                || (purposeOrder[left.purpose] ?? 9) - (purposeOrder[right.purpose] ?? 9)
                || left.name.localeCompare(right.name);
            });
          const payload = {
            version: `v${version}`,
            url: release.html_url || `https://github.com/${process.env.REPO}/releases/tag/${tag}`,
            body: release.body || "",
            assets
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
