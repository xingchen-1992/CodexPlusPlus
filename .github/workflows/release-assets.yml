name: Release assets

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CODEX_WINDOWS_X64_MSIX_URL: "https://codexapp.agentsmirror.com/latest/win-x64"
      CODEX_WINDOWS_X64_MSIX_CACHE_KEY: "2026-06-30"
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/codex-plus-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install NSIS with retry
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $installed = $false
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            choco install nsis -y --no-progress
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Chocolatey failed to install NSIS on attempt $attempt."
              Start-Sleep -Seconds (10 * $attempt)
              continue
            }
            $installed = $true
            break
          }
          if (-not $installed) {
            throw "Chocolatey failed to install NSIS after retries."
          }

          $candidatePaths = @(
            "${env:ProgramFiles(x86)}\NSIS\makensis.exe",
            "${env:ProgramFiles}\NSIS\makensis.exe",
            "C:\ProgramData\chocolatey\bin\makensis.exe"
          )
          $makensis = $candidatePaths | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $makensis) {
            $command = Get-Command makensis -ErrorAction SilentlyContinue
            if ($command) {
              $makensis = $command.Source
            }
          }
          if (-not $makensis) {
            throw "NSIS makensis.exe was not found"
          }
          "NSIS_MAKENSIS=$makensis" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-plus-plus.exe dist/windows/app/
          Copy-Item target/release/codex-plus-plus-manager.exe dist/windows/app/
          if ($env:CODEX_APP_SOURCE) {
            if (-not (Test-Path $env:CODEX_APP_SOURCE)) {
              throw "CODEX_APP_SOURCE is set but does not exist: $env:CODEX_APP_SOURCE"
            }
            Copy-Item $env:CODEX_APP_SOURCE dist/windows/app/Codex -Recurse -Force
          } else {
            Write-Host "CODEX_APP_SOURCE not set; installer will rely on the management tool install flow."
          }

      - name: Cache Codex Windows MSIX
        uses: actions/cache@v4
        with:
          path: ~/.cache/codex-plus-release/windows/CodexOfficialApp-x64.msix
          key: ${{ runner.os }}-codex-windows-msix-${{ env.CODEX_WINDOWS_X64_MSIX_CACHE_KEY }}

      - name: Download Codex Windows MSIX
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force dist/windows/package | Out-Null
          $msix = "dist/windows/package/CodexOfficialApp-x64.msix"
          $cache = Join-Path $env:USERPROFILE ".cache\codex-plus-release\windows\CodexOfficialApp-x64.msix"
          New-Item -ItemType Directory -Force (Split-Path $cache) | Out-Null
          if (Test-Path $cache) {
            Copy-Item $cache $msix -Force
          } else {
            curl.exe -L --retry 3 --retry-delay 10 --fail -o $msix $env:CODEX_WINDOWS_X64_MSIX_URL
            Copy-Item $msix $cache -Force
          }
          $size = (Get-Item $msix).Length
          if ($size -lt 100MB) {
            throw "Downloaded Codex MSIX is unexpectedly small: $size bytes"
          }

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart("v", "V")
          $makensis = $env:NSIS_MAKENSIS
          if (-not $makensis -or -not (Test-Path $makensis)) {
            $command = Get-Command makensis -ErrorAction SilentlyContinue
            if ($command) {
              $makensis = $command.Source
            }
          }
          if (-not $makensis -or -not (Test-Path $makensis)) {
            throw "NSIS makensis.exe was not found"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexPlusPlus.nsi
          Pop-Location

      - name: Build Windows ZIP package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ github.event.release.tag_name }}".TrimStart("v", "V")
          $setup = "dist/windows/CodexPlusOfficial-${version}-windows-x64-setup.exe"
          $msix = "dist/windows/package/CodexOfficialApp-x64.msix"
          if (-not (Test-Path $setup)) {
            throw "Missing setup executable: $setup"
          }
          if (-not (Test-Path $msix)) {
            throw "Missing Codex MSIX: $msix"
          }
          $packageRoot = "dist/windows/package-root"
          if (Test-Path $packageRoot) {
            Remove-Item $packageRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force $packageRoot | Out-Null
          $resourcesDir = "$packageRoot/安装资源"
          New-Item -ItemType Directory -Force $resourcesDir | Out-Null
          Copy-Item $setup "$packageRoot/双击安装.exe"
          Copy-Item $msix "$resourcesDir/CodexOfficialApp-x64.msix"
          Compress-Archive -Force -Path "$packageRoot/*" -DestinationPath "dist/windows/CodexPlusOfficial-${version}-windows-x64.zip"

      - name: Upload Windows ZIP package
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/windows/*.zip

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      CARGO_INCREMENTAL: "0"
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CODEX_MACOS_APP_VERSION: "26.623.70822"
      CODEX_MACOS_ARM64_ZIP_URL: "https://github.com/Wangnov/codex-app-mirror/releases/latest/download/Codex-darwin-arm64-26.623.70822.zip"
      CODEX_MACOS_X64_ZIP_URL: "https://github.com/Wangnov/codex-app-mirror/releases/latest/download/Codex-darwin-x64-26.623.70822.zip"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/codex-plus-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
            ${{ runner.os }}-cargo-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Cache Codex macOS app zip
        uses: actions/cache@v4
        with:
          path: ~/.cache/codex-plus-release/macos/${{ matrix.arch }}/codex-app.zip
          key: ${{ runner.os }}-${{ matrix.arch }}-codex-app-${{ env.CODEX_MACOS_APP_VERSION }}

      - name: Download Codex macOS app bundle
        env:
          CODEX_DARWIN_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          source_root="dist/codex-source/${CODEX_DARWIN_ARCH}"
          rm -rf "$source_root"
          mkdir -p "$source_root"
          cache_root="$HOME/.cache/codex-plus-release/macos/${CODEX_DARWIN_ARCH}"
          cache_zip="$cache_root/codex-app.zip"
          mkdir -p "$cache_root"
          case "$CODEX_DARWIN_ARCH" in
            arm64) url="$CODEX_MACOS_ARM64_ZIP_URL" ;;
            x64) url="$CODEX_MACOS_X64_ZIP_URL" ;;
            *) echo "Unsupported Codex macOS arch: $CODEX_DARWIN_ARCH" >&2; exit 1 ;;
          esac
          if [ -f "$cache_zip" ]; then
            cp "$cache_zip" "$source_root/codex-app.zip"
          else
            curl -L --retry 3 --retry-delay 10 --fail -o "$source_root/codex-app.zip" "$url"
            cp "$source_root/codex-app.zip" "$cache_zip"
          fi
          size="$(stat -f%z "$source_root/codex-app.zip")"
          if [ "$size" -lt 104857600 ]; then
            echo "Downloaded Codex macOS app zip is unexpectedly small: $size bytes" >&2
            exit 1
          fi
          unzip -q "$source_root/codex-app.zip" -d "$source_root/extracted"
          app="$(find "$source_root/extracted" -type d -name "*.app" -print -quit)"
          if [ -z "$app" ]; then
            echo "No .app bundle found in Codex macOS zip" >&2
            exit 1
          fi
          printf 'CODEX_APP_SOURCE=%s\n' "$PWD/$app" >> "$GITHUB_ENV"

      - name: Build macOS DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#V}"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          test -L "dist/macos/stage/Applications"
          test "$(readlink "dist/macos/stage/Applications")" = "/Applications"
          app="dist/macos/stage/Codex官方管理工具.app"
          test -f "$app/Contents/Info.plist"
          test -f "$app/Contents/PkgInfo"
          test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
          test -x "$app/Contents/MacOS/codex-plus-plus"
          test -d "$app/Contents/Resources/Codex.app" || test -d "$app/Contents/Resources/OpenAI Codex.app" || test -d "$app/Contents/Resources/OpenAI.Codex.app"
          plutil -lint "$app/Contents/Info.plist" >/dev/null
          codesign -dv "$app" >/dev/null 2>&1
          echo "verified: $app"

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/macos/*.dmg

  latest-json:
    name: Upload static latest.json
    runs-on: ubuntu-latest
    needs:
      - windows-installer
      - macos-dmg
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = release.tagName || process.env.TAG;
          const version = tag.replace(/^v/i, "");
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const assets = (release.assets || [])
            .map((asset) => asset.name)
            .filter((name) => name !== "latest.json")
            .map((name) => ({ name, url: `${baseUrl}/${encodeURIComponent(name)}` }));
          const payload = {
            version: `v${version}`,
            url: release.url || `https://github.com/${repo}/releases/tag/${tag}`,
            body: release.body || "",
            assets
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
